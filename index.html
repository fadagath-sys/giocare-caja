<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja Giocare</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 16px;
      margin: 0;
    }

    .contenedor {
      max-width: 900px;
      margin: auto;
    }

    .box {
      background: #111827;
      padding: 18px;
      border-radius: 16px;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }

    h1 {
      margin-top: 0;
    }

    .totales {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .total {
      background: #020617;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
    }

    .total small {
      color: #94a3b8;
    }

    .total div {
      font-size: 24px;
      font-weight: bold;
      margin-top: 6px;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 70px;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: #052e16;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .estado {
      color: #93c5fd;
      font-size: 14px;
      margin-top: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid #334155;
      padding: 9px;
      text-align: left;
    }

    th {
      color: #93c5fd;
    }

    .ingreso {
      color: #22c55e;
      font-weight: bold;
    }

    .salida {
      color: #ef4444;
      font-weight: bold;
    }

    .retiro {
      color: #f59e0b;
      font-weight: bold;
    }

    @media(max-width: 700px) {
      .totales {
        grid-template-columns: 1fr 1fr;
      }

      table {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="contenedor">

    <div class="box">
      <h1>Caja Giocare</h1>
      <p>Ingresos, gastos y retiros sincronizados.</p>
      <div class="estado" id="estado">Cargando datos...</div>
    </div>

    <div class="box totales">
      <div class="total"><small>Banco</small><div id="banco">$0</div></div>
      <div class="total"><small>Efectivo</small><div id="efectivo">$0</div></div>
      <div class="total"><small>Mercado Pago</small><div id="mp">$0</div></div>
      <div class="total"><small>Total</small><div id="total">$0</div></div>
    </div>

    <div class="box">
      <label>Fecha</label>
      <input type="date" id="fecha">

      <label>Tipo</label>
      <select id="tipo" onchange="actualizarConceptos()">
        <option value="Ingreso">Ingreso</option>
        <option value="Gasto">Gasto</option>
        <option value="Retiro de socios">Retiro de socios</option>
      </select>

      <label>Concepto</label>
      <select id="concepto"></select>

      <label>Medio</label>
      <select id="medio">
        <option value="Banco">Banco</option>
        <option value="Efectivo">Efectivo</option>
        <option value="Mercado Pago">Mercado Pago</option>
      </select>

      <label>Importe</label>
      <input type="number" id="importe" placeholder="Ej: 50000">

      <label>Observación</label>
      <textarea id="observacion" placeholder="Detalle manual"></textarea>

      <label>Usuario</label>
      <input type="text" id="usuario" placeholder="Ej: Facundo">

      <button id="btnGuardar" onclick="guardar()">Guardar movimiento</button>
    </div>

    <div class="box">
      <h3>Últimos movimientos</h3>
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Concepto</th>
            <th>Medio</th>
            <th>Importe</th>
            <th>Obs.</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>
    </div>

  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbydeo91UTDYTWbjrJ2Gf_rs4S69_251vRO2fFPZ9aViXyuF6R3vqqB3olMP6r9d1dKW/exec";

  const conceptos = {
    "Ingreso": [
      "Reserva de cumpleaños",
      "Cancelación de evento",
      "Otro ingreso"
    ],
    "Gasto": [
      "Sueldos",
      "Alquiler",
      "Luz",
      "Internet",
      "Publicidad",
      "Mantenimiento",
      "Impuestos",
      "Proveedores",
      "Mercadería",
      "Limpieza",
      "Reparaciones",
      "Otros gastos"
    ],
    "Retiro de socios": [
      "Retiro de socios"
    ]
  };

  document.getElementById("fecha").valueAsDate = new Date();

  function actualizarConceptos() {
    const tipo = document.getElementById("tipo").value;
    const concepto = document.getElementById("concepto");
    concepto.innerHTML = "";

    conceptos[tipo].forEach(item => {
      const opt = document.createElement("option");
      opt.value = item;
      opt.textContent = item;
      concepto.appendChild(opt);
    });
  }

  function moneda(n) {
    return "$" + Number(n || 0).toLocaleString("es-AR");
  }

  function claseTipo(tipo) {
    if (tipo === "Ingreso") return "ingreso";
    if (tipo === "Retiro de socios") return "retiro";
    return "salida";
  }

  function llamarAPI(params, callbackName) {
    return new Promise((resolve, reject) => {
      const cb = callbackName + "_" + Date.now();

      window[cb] = function(data) {
        delete window[cb];
        script.remove();
        resolve(data);
      };

      const query = new URLSearchParams({
        ...params,
        callback: cb
      });

      const script = document.createElement("script");
      script.src = API_URL + "?" + query.toString();
      script.onerror = function() {
        delete window[cb];
        script.remove();
        reject(new Error("No se pudo conectar con Apps Script"));
      };

      document.body.appendChild(script);
    });
  }

  async function guardar() {
    const btn = document.getElementById("btnGuardar");
    const estado = document.getElementById("estado");

    const data = {
      action: "guardar",
      fecha: document.getElementById("fecha").value,
      tipo: document.getElementById("tipo").value,
      concepto: document.getElementById("concepto").value,
      medio: document.getElementById("medio").value,
      importe: document.getElementById("importe").value,
      observacion: document.getElementById("observacion").value,
      usuario: document.getElementById("usuario").value
    };

    if (!data.importe || Number(data.importe) <= 0) {
      alert("Cargá un importe válido.");
      return;
    }

    try {
      btn.disabled = true;
      btn.textContent = "Guardando...";
      estado.textContent = "Guardando movimiento...";

      const res = await llamarAPI(data, "guardarCallback");

      if (!res.ok) {
        throw new Error("No se pudo guardar");
      }

      document.getElementById("importe").value = "";
      document.getElementById("observacion").value = "";

      await cargar();

      estado.textContent = "Movimiento guardado.";
      alert("Movimiento guardado.");

    } catch (error) {
      estado.textContent = "Error al guardar.";
      alert("Error: " + error.message);

    } finally {
      btn.disabled = false;
      btn.textContent = "Guardar movimiento";
    }
  }

  async function cargar() {
    const estado = document.getElementById("estado");

    try {
      estado.textContent = "Cargando datos...";

      const res = await llamarAPI({ action: "obtener" }, "obtenerCallback");

      document.getElementById("banco").textContent = moneda(res.totales.banco);
      document.getElementById("efectivo").textContent = moneda(res.totales.efectivo);
      document.getElementById("mp").textContent = moneda(res.totales.mp);
      document.getElementById("total").textContent = moneda(res.totales.total);

      const tabla = document.getElementById("tabla");
      tabla.innerHTML = "";

      res.movimientos.forEach(m => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${m.fecha}</td>
          <td class="${claseTipo(m.tipo)}">${m.tipo}</td>
          <td>${m.concepto}</td>
          <td>${m.medio}</td>
          <td>${moneda(m.importe)}</td>
          <td>${m.observacion || ""}</td>
        `;

        tabla.appendChild(tr);
      });

      estado.textContent = "Datos actualizados.";

    } catch (error) {
      estado.textContent = "Error al cargar datos.";
      alert("Error al cargar: " + error.message);
    }
  }

  actualizarConceptos();
  cargar();
  setInterval(cargar, 15000);
</script>

</body>
</html>
